<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpsCore — AI assistant that reads your Gmail, Calendar, and Drive to tell you exactly what to work on next." />
    <title>OpsCore — Smart Freelance Ops Assistant</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' },
                        brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        urgent: { high: '#ef4444', medium: '#f59e0b', low: '#22c55e' },
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
                    },
                },
            },
        };
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: #0f172a; color: #f1f5f9; }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(99, 102, 241, 0.35);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.08);
        }
        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .shimmer-bg {
            background: linear-gradient(90deg, rgba(30,41,59,0) 0%, rgba(99,102,241,0.08) 50%, rgba(30,41,59,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }
        .urgency-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .spinner {
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .copy-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(34, 197, 94, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            animation: fadeIn 0.3s ease-out, slideUp 0.3s ease-out;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        /* ─── Urgency Badge Component ─── */
        function UrgencyBadge({ level }) {
            const config = {
                high:   { bg: 'rgba(239,68,68,0.15)', color: '#ef4444', icon: '🔴', label: 'High' },
                medium: { bg: 'rgba(245,158,11,0.15)', color: '#f59e0b', icon: '🟡', label: 'Medium' },
                low:    { bg: 'rgba(34,197,94,0.15)',  color: '#22c55e', icon: '🟢', label: 'Low' },
            };
            const c = config[level] || config.low;
            return (
                <span className="urgency-badge" style={{ background: c.bg, color: c.color }} aria-label={`Urgency: ${c.label}`}>
                    <span aria-hidden="true">{c.icon}</span> {c.label}
                </span>
            );
        }

        /* ─── Skeleton Loader ─── */
        function SkeletonCard() {
            return (
                <div className="glass-card p-6 space-y-4">
                    <div className="h-5 w-1/3 rounded bg-surface-700 shimmer-bg"></div>
                    <div className="h-4 w-full rounded bg-surface-700 shimmer-bg"></div>
                    <div className="h-4 w-2/3 rounded bg-surface-700 shimmer-bg"></div>
                    <div className="h-4 w-5/6 rounded bg-surface-700 shimmer-bg"></div>
                </div>
            );
        }

        /* ─── Priority Queue Panel ─── */
        function PriorityQueue({ items }) {
            return (
                <div className="glass-card p-6 animate-slide-up">
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                        <span className="text-xl">📋</span> Priority Queue
                    </h2>
                    <div className="space-y-3">
                        {items.map((item, index) => (
                            <div key={index} className="bg-surface-800/50 rounded-xl p-4 border border-surface-700/50 hover:border-brand-500/30 transition-all duration-300">
                                <div className="flex items-start justify-between gap-3 mb-2">
                                    <div className="flex items-center gap-2">
                                        <span className="flex items-center justify-center w-7 h-7 rounded-full bg-brand-600/20 text-brand-400 font-bold text-sm shrink-0">
                                            {item.rank}
                                        </span>
                                        <span className="font-semibold text-surface-100 text-sm">{item.task}</span>
                                    </div>
                                    <UrgencyBadge level={item.urgency} />
                                </div>
                                <p className="text-surface-200/70 text-xs ml-9 leading-relaxed">{item.reason}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        /* ─── Drafted Reply Panel ─── */
        function DraftedReply({ reply, onCopy }) {
            return (
                <div className="glass-card p-6 animate-slide-up" style={{ animationDelay: '0.1s' }}>
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                        <span className="text-xl">✉️</span> Drafted Reply
                    </h2>
                    <div className="space-y-3">
                        <div className="bg-surface-800/50 rounded-xl p-4 border border-surface-700/50">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-xs font-semibold text-surface-200/50 uppercase tracking-wider">To</span>
                                <span className="text-sm text-surface-100">{reply.to}</span>
                            </div>
                            <div className="flex items-center gap-2 mb-3">
                                <span className="text-xs font-semibold text-surface-200/50 uppercase tracking-wider">Subject</span>
                                <span className="text-sm text-surface-100">{reply.subject}</span>
                            </div>
                            <div className="border-t border-surface-700/40 pt-3">
                                <p className="text-surface-200/80 text-sm leading-relaxed whitespace-pre-wrap">{reply.body}</p>
                            </div>
                        </div>
                        <button
                            onClick={onCopy}
                            className="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2"
                            aria-label="Copy drafted reply to clipboard"
                            id="copy-reply-button"
                        >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                            Copy Reply
                        </button>
                    </div>
                </div>
            );
        }

        /* ─── Deadline Alert Panel ─── */
        function DeadlineAlert({ alert }) {
            if (!alert || !alert.exists) {
                return (
                    <div className="glass-card p-6 animate-slide-up" style={{ animationDelay: '0.2s' }}>
                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                            <span className="text-xl">⏰</span> Deadline Alert
                        </h2>
                        <div className="bg-surface-800/50 rounded-xl p-6 border border-surface-700/50 text-center">
                            <span className="text-3xl mb-2 block">✅</span>
                            <p className="text-surface-200/70 text-sm">No urgent deadlines in the next 24 hours.</p>
                        </div>
                    </div>
                );
            }
            return (
                <div className="glass-card p-6 animate-slide-up border-urgent-high/20" style={{ animationDelay: '0.2s' }}>
                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                        <span className="text-xl animate-pulse-slow">🚨</span> Deadline Alert
                    </h2>
                    <div className="bg-red-950/30 rounded-xl p-4 border border-red-500/20">
                        <p className="font-semibold text-red-400 text-sm mb-1">{alert.event}</p>
                        <p className="text-surface-200/70 text-xs mb-2">Due: {alert.due}</p>
                        <div className="bg-red-500/10 rounded-lg p-3 mt-2">
                            <p className="text-surface-100 text-sm font-medium">⚡ {alert.action_needed}</p>
                        </div>
                    </div>
                </div>
            );
        }

        /* ─── Main App ─── */
        function App() {
            const [authStatus, setAuthStatus] = useState(null);
            const [analysis, setAnalysis] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [showToast, setShowToast] = useState(false);
            const [checkingAuth, setCheckingAuth] = useState(true);

            useEffect(() => {
                fetch('/auth/status')
                    .then(response => response.json())
                    .then(data => { setAuthStatus(data); setCheckingAuth(false); })
                    .catch(() => { setAuthStatus({ is_authenticated: false }); setCheckingAuth(false); });
            }, []);

            const handleAnalyze = useCallback(async () => {
                setLoading(true);
                setError(null);
                setAnalysis(null);
                try {
                    const response = await fetch('/api/analyze', { method: 'POST' });
                    if (response.status === 401) {
                        setError('Session expired. Please sign in again.');
                        setAuthStatus({ is_authenticated: false });
                        return;
                    }
                    if (!response.ok) {
                        const errorData = await response.json();
                        setError(errorData.error || 'Something went wrong. Please try again.');
                        return;
                    }
                    const data = await response.json();
                    setAnalysis(data);
                } catch (fetchError) {
                    setError('Network error. Check your connection and try again.');
                } finally {
                    setLoading(false);
                }
            }, []);

            const handleRegenerate = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch('/api/regenerate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ additional_context: '' }),
                    });
                    if (!response.ok) {
                        const errorData = await response.json();
                        setError(errorData.error || 'Regeneration failed. Please try again.');
                        return;
                    }
                    const data = await response.json();
                    setAnalysis(data);
                } catch (fetchError) {
                    setError('Network error. Check your connection and try again.');
                } finally {
                    setLoading(false);
                }
            }, []);

            const handleCopyReply = useCallback(() => {
                if (!analysis?.drafted_reply) return;
                const replyText = `To: ${analysis.drafted_reply.to}\nSubject: ${analysis.drafted_reply.subject}\n\n${analysis.drafted_reply.body}`;
                navigator.clipboard.writeText(replyText).then(() => {
                    setShowToast(true);
                    setTimeout(() => setShowToast(false), 2000);
                });
            }, [analysis]);

            if (checkingAuth) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="spinner" style={{ width: 40, height: 40 }}></div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-hidden">
                    {/* Background glow effects */}
                    <div className="hero-glow" style={{ top: '-150px', left: '-100px' }}></div>
                    <div className="hero-glow" style={{ bottom: '-200px', right: '-150px', background: 'radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%)' }}></div>

                    {/* Navigation Bar */}
                    <nav className="relative z-10 border-b border-surface-700/30 bg-surface-900/50 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center font-bold text-white text-sm">O</div>
                                <h1 className="text-xl font-bold gradient-text">OpsCore</h1>
                            </div>
                            <div className="flex items-center gap-3">
                                {authStatus?.is_authenticated ? (
                                    <div className="flex items-center gap-3">
                                        <div className="hidden sm:flex flex-col items-end">
                                            <span className="text-sm font-medium text-surface-100">{authStatus.user_name}</span>
                                            <span className="text-xs text-surface-200/50">{authStatus.user_email}</span>
                                        </div>
                                        {authStatus.user_picture && (
                                            <img
                                                src={authStatus.user_picture}
                                                alt={`${authStatus.user_name}'s profile`}
                                                className="w-9 h-9 rounded-full ring-2 ring-brand-500/30"
                                                referrerPolicy="no-referrer"
                                            />
                                        )}
                                        <a
                                            href="/auth/logout"
                                            className="text-xs text-surface-200/50 hover:text-surface-100 transition-colors px-3 py-1.5 rounded-lg border border-surface-700/50 hover:border-surface-600"
                                            aria-label="Sign out of Google account"
                                            id="logout-button"
                                        >
                                            Sign Out
                                        </a>
                                    </div>
                                ) : (
                                    <a
                                        href="/auth/login"
                                        className="btn-primary px-5 py-2 rounded-xl text-white font-semibold text-sm flex items-center gap-2"
                                        aria-label="Sign in with Google"
                                        id="login-button"
                                    >
                                        <svg className="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                                        Sign in with Google
                                    </a>
                                )}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        {/* Hero Section */}
                        {!analysis && !loading && (
                            <div className="text-center mb-12 animate-fade-in">
                                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-600/10 border border-brand-500/20 text-brand-400 text-xs font-semibold mb-6 uppercase tracking-wider">
                                    <span className="w-1.5 h-1.5 rounded-full bg-brand-400 animate-pulse"></span>
                                    AI-Powered Operations
                                </div>
                                <h2 className="text-4xl sm:text-5xl font-extrabold mb-4">
                                    <span className="gradient-text">What should you</span><br />
                                    <span className="text-surface-100">work on next?</span>
                                </h2>
                                <p className="text-surface-200/60 text-lg max-w-2xl mx-auto mb-8 leading-relaxed">
                                    OpsCore reads your Gmail, Calendar, and Drive — then tells you exactly
                                    what to prioritize, and drafts the reply for you.
                                </p>
                                {authStatus?.is_authenticated ? (
                                    <button
                                        onClick={handleAnalyze}
                                        disabled={loading}
                                        className="btn-primary px-8 py-3.5 rounded-2xl text-white font-bold text-base inline-flex items-center gap-3"
                                        aria-label="Analyze my day"
                                        id="analyze-button"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                                        Analyze My Day
                                    </button>
                                ) : (
                                    <p className="text-surface-200/40 text-sm">Sign in with Google to get started →</p>
                                )}
                            </div>
                        )}

                        {/* Error Display */}
                        {error && (
                            <div className="mb-8 animate-fade-in">
                                <div className="glass-card p-4 border-red-500/30 bg-red-950/20 flex items-center gap-3">
                                    <span className="text-red-400 text-xl shrink-0">⚠️</span>
                                    <p className="text-red-300 text-sm font-medium">{error}</p>
                                    <button
                                        onClick={() => setError(null)}
                                        className="ml-auto text-red-400/60 hover:text-red-300 transition-colors"
                                        aria-label="Dismiss error"
                                        id="dismiss-error-button"
                                    >✕</button>
                                </div>
                            </div>
                        )}

                        {/* Loading Skeleton */}
                        {loading && (
                            <div>
                                <div className="flex items-center justify-center gap-3 mb-8 animate-fade-in">
                                    <div className="spinner"></div>
                                    <span className="text-brand-400 font-semibold text-sm">Analyzing your day...</span>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <SkeletonCard />
                                    <SkeletonCard />
                                    <SkeletonCard />
                                </div>
                            </div>
                        )}

                        {/* Results Grid */}
                        {analysis && !loading && (
                            <div>
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-bold text-surface-100">Your Day at a Glance</h2>
                                    <button
                                        onClick={handleRegenerate}
                                        className="text-sm text-brand-400 hover:text-brand-300 font-semibold flex items-center gap-1.5 px-4 py-2 rounded-xl border border-brand-500/20 hover:border-brand-500/40 transition-all"
                                        aria-label="Regenerate analysis"
                                        id="regenerate-button"
                                    >
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                                        Regenerate
                                    </button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <PriorityQueue items={analysis.priority_queue} />
                                    <DraftedReply reply={analysis.drafted_reply} onCopy={handleCopyReply} />
                                    <DeadlineAlert alert={analysis.deadline_alert} />
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="relative z-10 border-t border-surface-700/20 mt-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center">
                            <p className="text-surface-200/30 text-xs">OpsCore — Built for the Google Gemini API Developer Competition</p>
                        </div>
                    </footer>

                    {/* Copy Toast */}
                    {showToast && <div className="copy-toast" role="status" aria-live="polite">✓ Copied to clipboard!</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
